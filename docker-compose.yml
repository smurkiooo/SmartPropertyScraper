services:
  minio:
    image: minio/minio:latest
    container_name: realty-minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web UI на http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Одноразовый контейнер: ждёт, пока поднимется MinIO, и создаёт бакеты.
  mc:
    image: minio/mc:latest
    container_name: realty-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/realty;
        mc mb --ignore-existing local/dvc-storage;
        echo '>>> buckets ready: realty, dvc-storage';

volumes:
  minio-data:
